<!doctype html>
<html lang="it"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live</title>
<style>
body{font-family:Arial;margin:20px}
table{border-collapse:collapse;width:100%}
th,td{border-bottom:1px solid #ddd;padding:6px;text-align:left}
</style></head>
<body>

<h2>D.S. CronoAgility Live</h2>
<table>
<thead>
<tr>
<th>Ordine</th>
<th>Pettorale</th>
<th>Concorrente</th>
<th>Conduttore</th>
<th>Classe</th>
<th>Categoria</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>
const API="https://script.google.com/macros/s/AKfycbzTyoC76wLJLa8UB-7ZoJcArDrN5ByY75sGYc4yoHRjTvCdTR2LVIb1xFu5bSya7zqJpA/exec"

const p=new URL(location.href).searchParams
const gara=p.get("gara")
const cat=p.get("cat")

async function load(){
let r=await fetch(API+"?gara="+encodeURIComponent(gara)+"&cat="+encodeURIComponent(cat))
let j=await r.json()
let tb=document.getElementById("tb")
tb.innerHTML=""
;(j.startlist||[]).forEach(x=>{
let tr=document.createElement("tr")
tr.innerHTML=`<td>${x["Ordine"]||""}</td>
<td>${x["Numero Pettorale"]||""}</td>
<td>${x["Concorrente"]||""}</td>
<td>${x["Conduttore"]||""}</td>
<td>${x["Classe"]||""}</td>
<td>${x["Categoria"]||""}</td>`
tb.appendChild(tr)
})
}
load()
setInterval(load,8000)
</script>
</body></html>
