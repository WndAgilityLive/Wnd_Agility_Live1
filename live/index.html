<!-- live/index.html -->
<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>D.S. CronoAgility — Live</title>
  <style>
    body{font-family:system-ui,Arial;margin:16px;max-width:1200px}
    .pill{padding:6px 10px;border:1px solid #ddd;border-radius:999px;display:inline-block;margin-right:8px}
    .muted{opacity:.7}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border-bottom:1px solid #eee;padding:8px;text-align:left}
    th{position:sticky;top:0;background:#fff}
    .box{border:1px solid #e6e6e6;border-radius:14px;padding:12px;margin-top:14px}
  </style>
</head>
<body>
  <div>
    <span class="pill"><b>Gara:</b> <span id="gara">-</span></span>
    <span class="pill"><b>Categoria:</b> <span id="cat">-</span></span>
    <span class="pill muted">Aggiornato: <span id="upd">-</span></span>
  </div>

  <div class="box">
    <b>Ordine di partenza</b>
    <table>
      <thead>
        <tr>
          <th>Ordine</th><th>Pettorale</th><th>Club</th><th>Concorrente</th><th>Conduttore</th><th>Classe</th><th>Categoria</th>
        </tr>
      </thead>
      <tbody id="startTb"><tr><td colspan="7" class="muted">In attesa...</td></tr></tbody>
    </table>
  </div>

<script>
  const API_BASE = "INCOLLA_QUI_L_URL_EXEC"; // lascia quello che già usi
  const $ = (id)=>document.getElementById(id);

  function qs(name){
    const u = new URL(location.href);
    return (u.searchParams.get(name)||"").trim();
  }
  const gara = qs("gara");
  const cat  = qs("cat");
  $("gara").textContent = gara || "-";
  $("cat").textContent  = cat  || "-";

  function esc(s){
    return String(s??"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  async function load(){
    if(!gara || !cat){ $("upd").textContent="Manca gara/cat"; return; }
    const url = `${API_BASE}?gara=${encodeURIComponent(gara)}&cat=${encodeURIComponent(cat)}&t=${Date.now()}`;
    try{
      const r = await fetch(url, {cache:"no-store"});
      const j = await r.json();
      const list = j.startlist || [];
      $("upd").textContent = j.serverTime ? new Date(j.serverTime).toLocaleString() : new Date().toLocaleString();

      $("startTb").innerHTML = list.length
        ? list.sort((a,b)=>Number(a["Ordine"]||a.Ordine||0)-Number(b["Ordine"]||b.Ordine||0)).map(x=>`
          <tr>
            <td>${esc(x["Ordine"] ?? x.Ordine ?? "")}</td>
            <td>${esc(x["Numero Pettorale"] ?? x.bib ?? "")}</td>
            <td>${esc(x.Club ?? "")}</td>
            <td>${esc(x.Concorrente ?? "")}</td>
            <td>${esc(x.Conduttore ?? "")}</td>
            <td>${esc(x.Classe ?? "")}</td>
            <td>${esc(x.Categoria ?? "")}</td>
          </tr>`).join("")
        : `<tr><td colspan="7" class="muted">Nessun dato</td></tr>`;
    }catch(e){
      $("upd").textContent="Errore";
    }
  }

  load();
  setInterval(load, 8000);
</script>
</body>
</html>
